<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histologia Humana</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f04e;
    --accent2: #4ef0c8;
    --accent3: #f04e8a;
    --text: #f0ede6;
    --muted: #6b6b6b;
    --correct: #4ef0a0;
    --wrong: #f05050;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; }
  .container { max-width: 700px; margin: 0 auto; padding: 24px 16px 60px; position: relative; z-index: 1; }
  header { text-align: center; padding: 32px 0 28px; }
  .label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; display: block; }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 6vw, 42px); font-weight: 800; line-height: 1.05; letter-spacing: -1px; color: var(--text); }
  h1 span { color: var(--accent); }
  .tabs { display: flex; gap: 8px; margin: 24px 0 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 6px; }
  .tab { flex: 1; padding: 10px 6px; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.3px; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted); }
  .tab.active { background: var(--accent); color: #0d0d0d; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
  .progress-text { font-size: 12px; color: var(--muted); text-align: right; margin-top: 6px; margin-bottom: 20px; }
  .quiz-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-bottom: 16px; animation: fadeUp 0.3s ease; }
  .category-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 4px 10px; border-radius: 99px; margin-bottom: 16px; border: 1px solid; }
  .cat-epitelial { color: var(--accent); border-color: var(--accent); background: rgba(200,240,78,0.08); }
  .cat-conjuntivo { color: var(--accent2); border-color: var(--accent2); background: rgba(78,240,200,0.08); }
  .cat-muscular { color: var(--accent3); border-color: var(--accent3); background: rgba(240,78,138,0.08); }
  .cat-nervoso { color: #b4a0ff; border-color: #b4a0ff; background: rgba(180,160,255,0.08); }
  .question-text { font-size: 17px; line-height: 1.5; font-weight: 500; color: var(--text); margin-bottom: 22px; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { padding: 14px 18px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--text); cursor: pointer; text-align: left; transition: all 0.18s; font-family: 'DM Sans', sans-serif; line-height: 1.4; }
  .option:hover:not(:disabled) { border-color: var(--accent); background: rgba(200,240,78,0.06); transform: translateX(3px); }
  .option.correct { border-color: var(--correct); background: rgba(78,240,160,0.12); color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: rgba(240,80,80,0.1); color: var(--wrong); }
  .option:disabled { cursor: default; }
  .feedback { margin-top: 16px; padding: 14px 16px; border-radius: 10px; font-size: 13.5px; line-height: 1.5; display: none; }
  .feedback.show { display: block; animation: fadeUp 0.25s ease; }
  .feedback.correct-fb { background: rgba(78,240,160,0.1); border: 1px solid rgba(78,240,160,0.2); color: var(--correct); }
  .feedback.wrong-fb { background: rgba(240,80,80,0.08); border: 1px solid rgba(240,80,80,0.15); color: #f09090; }
  /* FLASHCARD */
  .flashcard-wrap { perspective: 1200px; margin-bottom: 20px; cursor: pointer; }
  .flashcard { position: relative; width: 100%; min-height: 220px; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4,0,0.2,1); border-radius: 16px; }
  .flashcard.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 32px 24px; text-align: center; min-height: 220px; }
  .card-front { background: var(--card); border: 1px solid var(--border); }
  .card-back { background: var(--surface); border: 1px solid var(--accent); transform: rotateY(180deg); }
  .card-hint { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .card-back .card-hint { color: var(--accent); }
  .card-question { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; line-height: 1.4; color: var(--text); }
  .card-answer { font-size: 15px; line-height: 1.6; color: var(--text); font-weight: 400; }
  .card-answer strong { color: var(--accent); font-weight: 600; }
  /* DISSERTATIVO */
  .diss-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 24px; margin-bottom: 16px; animation: fadeUp 0.3s ease; }
  .diss-textarea { width: 100%; min-height: 130px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.6; padding: 14px 16px; resize: vertical; transition: border-color 0.2s; outline: none; margin-top: 4px; }
  .diss-textarea:focus { border-color: var(--accent); }
  .diss-textarea::placeholder { color: var(--muted); }
  .diss-result { margin-top: 16px; padding: 18px; border-radius: 12px; display: none; animation: fadeUp 0.3s ease; }
  .diss-result.show { display: block; }
  .diss-result.loading { background: rgba(200,240,78,0.05); border: 1px solid rgba(200,240,78,0.15); color: var(--muted); font-size: 14px; }
  .diss-result.done { background: var(--surface); border: 1px solid var(--border); }
  .result-score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .result-badge { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .result-badge.great { color: var(--correct); }
  .result-badge.ok { color: #f0c84e; }
  .result-badge.low { color: var(--wrong); }
  .result-label { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .result-label.great { color: var(--correct); }
  .result-label.ok { color: #f0c84e; }
  .result-label.low { color: var(--wrong); }
  .result-text { font-size: 14px; line-height: 1.65; color: #c8c4be; }
  .result-text strong { color: var(--text); }
  .gabarito-box { margin-top: 14px; padding: 14px 16px; background: rgba(200,240,78,0.05); border: 1px solid rgba(200,240,78,0.12); border-radius: 10px; }
  .gabarito-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .gabarito-text { font-size: 13px; line-height: 1.6; color: #c8c4be; }
  .gabarito-text strong { color: var(--accent); }
  /* NAV */
  .nav-row { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin-top: 4px; }
  .btn { padding: 12px 22px; border: 1.5px solid var(--border); border-radius: 10px; background: transparent; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.18s; letter-spacing: 0.3px; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #0d0d0d; flex: 1; }
  .btn-primary:hover { opacity: 0.88; color: #0d0d0d; border-color: var(--accent); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-icon { width: 46px; height: 46px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  /* SCORE */
  .score-board { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 36px 24px; text-align: center; animation: fadeUp 0.4s ease; display: none; }
  .score-board.show { display: block; }
  .score-num { font-family: 'Syne', sans-serif; font-size: 72px; font-weight: 800; line-height: 1; color: var(--accent); margin: 12px 0 6px; }
  .score-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .score-emoji { font-size: 40px; margin-bottom: 8px; }
  /* FILTERS */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .filter-btn { padding: 6px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; font-family: 'Syne', sans-serif; }
  .filter-btn.active-f { color: #0d0d0d; border-color: var(--accent); background: var(--accent); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="label">Ciências Morfofuncional</span>
    <h1>Histologia<br><span>Humana</span></h1>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="setMode('quiz')">🧪 Quiz</button>
    <button class="tab" onclick="setMode('flash')">🃏 Flashcards</button>
    <button class="tab" onclick="setMode('diss')">✍️ Dissertativo</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-mode">
    <div class="filter-row" id="quiz-filters"></div>
    <div class="progress-bar"><div class="progress-fill" id="quiz-progress"></div></div>
    <div class="progress-text" id="quiz-progress-text"></div>
    <div id="quiz-area"></div>
    <div class="score-board" id="score-board">
      <div class="score-emoji" id="score-emoji"></div>
      <div class="label">Resultado Final</div>
      <div class="score-num" id="score-num"></div>
      <div class="score-sub" id="score-sub"></div>
      <button class="btn btn-primary" onclick="restartQuiz()" style="width:100%">Tentar Novamente</button>
    </div>
  </div>

  <!-- FLASHCARDS -->
  <div id="flash-mode" style="display:none">
    <div class="filter-row" id="flash-filters"></div>
    <div class="progress-bar"><div class="progress-fill" id="flash-progress"></div></div>
    <div class="progress-text" id="flash-progress-text"></div>
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="card-face card-front">
          <div class="card-hint">Toque para revelar</div>
          <div class="card-question" id="fc-question"></div>
        </div>
        <div class="card-face card-back">
          <div class="card-hint">Resposta</div>
          <div class="card-answer" id="fc-answer"></div>
        </div>
      </div>
    </div>
    <div class="nav-row">
      <button class="btn btn-icon" onclick="fcNav(-1)">←</button>
      <button class="btn btn-primary" onclick="shuffleFlash()">🔀 Embaralhar</button>
      <button class="btn btn-icon" onclick="fcNav(1)">→</button>
    </div>
  </div>

  <!-- DISSERTATIVO -->
  <div id="diss-mode" style="display:none">
    <div class="filter-row" id="diss-filters"></div>
    <div class="progress-bar"><div class="progress-fill" id="diss-progress"></div></div>
    <div class="progress-text" id="diss-progress-text"></div>
    <div id="diss-area"></div>
  </div>
</div>

<script>
const ALL_DATA = {
  quiz: [
    { cat:'epitelial', q:'Qual é a principal característica estrutural do tecido epitelial?', opts:['Células muito afastadas com muita substância intercelular','Células justapostas (muito unidas) com pouco espaço entre elas','Presença de fibras colágenas abundantes','Células com propriedades contráteis'], correct:1, exp:'O tecido epitelial tem células justapostas — muito unidas — e praticamente sem substância extracelular entre elas.' },
    { cat:'epitelial', q:'O tecido epitelial NÃO apresenta:', opts:['Capacidade de renovação celular','Vascularização própria','Células justapostas','Função de revestimento'], correct:1, exp:'O tecido epitelial é avascular — não tem vasos sanguíneos. Sua nutrição vem do tecido conjuntivo subjacente.' },
    { cat:'epitelial', q:'Qual é a diferença entre glândula exócrina e endócrina?', opts:['Exócrina produz hormônios; endócrina produz enzimas','Exócrina lança secreção em canais até a superfície; endócrina lança direto na corrente sanguínea','Exócrina está no sangue; endócrina está na pele','Exócrina é involuntária; endócrina é voluntária'], correct:1, exp:'Glândulas exócrinas têm ductos e liberam secreção em superfícies (ex: sudoríparas). As endócrinas liberam hormônios direto na corrente sanguínea (ex: tireoide, hipófise).' },
    { cat:'epitelial', q:'O pâncreas é considerado uma glândula mista. O que isso significa?', opts:['Funciona como exócrina e endócrina ao mesmo tempo','Só produz hormônios','Só produz enzimas digestivas','Não tem ductos'], correct:0, exp:'O pâncreas age como exócrina (produz enzimas digestivas com ductos) E como endócrina (produz insulina/glucagon que vão ao sangue).' },
    { cat:'epitelial', q:'A bexiga urinária é revestida por qual tipo de epitélio?', opts:['Simples pavimentoso','Pseudo-estratificado','Estratificado de transição','Simples prismático'], correct:2, exp:'A bexiga é revestida por epitélio estratificado de transição, que permite expansão quando se enche de urina.' },
    { cat:'epitelial', q:'Qual função o tecido epitelial exerce no estômago?', opts:['Impermeabilização','Absorção de oxigênio','Secreção','Contração muscular'], correct:2, exp:'No estômago o epitélio tem função de secreção — produz suco gástrico, muco e outras substâncias digestivas.' },
    { cat:'conjuntivo', q:'Qual é o tecido de maior distribuição no corpo humano?', opts:['Tecido epitelial','Tecido nervoso','Tecido conjuntivo propriamente dito','Tecido muscular liso'], correct:2, exp:'O tecido conjuntivo propriamente dito é o mais distribuído do corpo, presente na derme e em todo o organismo.' },
    { cat:'conjuntivo', q:'Quais são os três componentes estruturais do tecido conjuntivo?', opts:['Células, fibras e neurônios','Substância extracelular, fibras e células','Colágeno, elastina e plasma','Adipócitos, osteócitos e condrócitos'], correct:1, exp:'O tecido conjuntivo é formado por: substância/matriz extracelular + fibras (colágenas, elásticas, reticulares) + células.' },
    { cat:'conjuntivo', q:'O mastócito é responsável por:', opts:['Produzir colágeno','Fagocitar microorganismos','Liberar histamina em reações alérgicas','Produzir anticorpos'], correct:2, exp:'O mastócito contém heparina e histamina. A histamina é liberada em contato com antígenos, desencadeando reações alérgicas.' },
    { cat:'conjuntivo', q:'Qual célula do tecido conjuntivo produz o colágeno?', opts:['Macrófago','Plasmócito','Mastócito','Fibroblasto'], correct:3, exp:'O fibroblasto produz o colágeno e a substância intercelular do tecido conjuntivo.' },
    { cat:'conjuntivo', q:'Por que surgem rugas com o envelhecimento?', opts:['O tecido epitelial perde células','As fibras colágenas se unem e tornam o conjuntivo mais rígido','O tecido adiposo desaparece completamente','Os mastócitos param de funcionar'], correct:1, exp:'Com a idade, as fibras colágenas se unem progressivamente, tornando o tecido conjuntivo mais rígido e menos elástico.' },
    { cat:'conjuntivo', q:'O tecido adiposo está localizado principalmente:', opts:['Na epiderme','Na hipoderme (embaixo da pele)','No interior dos ossos','No revestimento dos vasos sanguíneos'], correct:1, exp:'O tecido adiposo se localiza principalmente na hipoderme, mas também envolve órgãos como coração e rins.' },
    { cat:'conjuntivo', q:'Qual NÃO é função do tecido adiposo?', opts:['Reserva de energia','Isolante térmico','Produção de anticorpos','Amortecedor contra choques mecânicos'], correct:2, exp:'Produção de anticorpos é função dos plasmócitos. O adiposo serve como reserva energética, isolante térmico e amortecedor.' },
    { cat:'conjuntivo', q:'O processo de hematopoiese ocorre na:', opts:['Medula óssea amarela','Hipoderme','Medula óssea vermelha','Cartilagem hialina'], correct:2, exp:'A hematopoiese ocorre na medula óssea vermelha a partir de células-tronco pluripotentes.' },
    { cat:'conjuntivo', q:'Eritrócitos, leucócitos e plaquetas são, respectivamente:', opts:['Células de defesa, hemácias e coagulação','Hemácias, células de defesa e coagulação','Coagulação, hemácias e células de defesa','Plasma, hemácias e leucócitos'], correct:1, exp:'Eritrócitos = hemácias (O₂/CO₂). Leucócitos = defesa imune (5 tipos). Plaquetas = coagulação.' },
    { cat:'conjuntivo', q:'O tecido cartilaginoso recebe nutrição por:', opts:['Pelo plasma diretamente','Por capilares do pericôndrio','Pelos condroblastos internamente','Por difusão da medula óssea'], correct:1, exp:'A cartilagem é avascular; sua nutrição vem dos capilares do pericôndrio — tecido conjuntivo que a envolve.' },
    { cat:'conjuntivo', q:'As células do tecido ósseo são:', opts:['Condroblastos, condrócitos e pericôndrio','Adipócitos, fibroblastos e mastócitos','Osteoblastos, osteócitos e osteoclastos','Eritrócitos, leucócitos e plaquetas'], correct:2, exp:'Osteoblastos (formam o osso), osteócitos (manutenção) e osteoclastos (reabsorção óssea).' },
    { cat:'muscular', q:'Qual tipo de tecido muscular tem contração VOLUNTÁRIA?', opts:['Muscular liso','Muscular estriado cardíaco','Muscular estriado esquelético','Todos os tipos'], correct:2, exp:'Apenas o músculo estriado esquelético é voluntário. O cardíaco e o liso são involuntários.' },
    { cat:'muscular', q:'O tecido muscular cardíaco se diferencia dos demais porque:', opts:['É voluntário e mononucleado','Tem contração involuntária e células unidas por discos intercalares','É encontrado nos órgãos viscerais','Tem células multinucleadas com estrias transversais'], correct:1, exp:'O cardíaco tem contração involuntária, células binucleadas e discos intercalares para contração rítmica e vigorosa.' },
    { cat:'muscular', q:'O peristaltismo é realizado pelo:', opts:['Músculo estriado esquelético','Músculo estriado cardíaco','Músculo liso','Tecido conjuntivo'], correct:2, exp:'O músculo liso está nos órgãos viscerais (esôfago, intestino, útero) e é responsável pelo peristaltismo.' },
    { cat:'muscular', q:'As células do tecido muscular são chamadas de:', opts:['Neurônios','Adipócitos','Fibroblastos','Miócitos ou fibras musculares'], correct:3, exp:'As células musculares são os miócitos (fibras musculares), capazes de se contrair e gerar movimentos.' },
    { cat:'muscular', q:'Quantos núcleos têm as células do músculo estriado esquelético?', opts:['Um (mononucleadas)','Dois (binucleadas)','Muitos (multinucleadas)','Nenhum'], correct:2, exp:'As células do músculo esquelético são multinucleadas. O cardíaco é binucleado e o liso é mononucleado.' },
    { cat:'nervoso', q:'As células do tecido nervoso que conduzem impulsos são:', opts:['Fibroblastos','Neurônios','Miócitos','Condrócitos'], correct:1, exp:'Os neurônios são as células condutoras do tecido nervoso.' },
    { cat:'nervoso', q:'Qual estrutura do neurônio recebe mensagens de outros neurônios?', opts:['Axônio','Núcleo','Corpo celular','Dendritos'], correct:3, exp:'Os dendritos recebem mensagens. O axônio transmite o impulso para outras células.' },
  ],

  flash: [
    { cat:'epitelial', q:'Quais são as características do tecido epitelial?', a:'Células <strong>justapostas</strong> (muito unidas), <strong>sem vascularização</strong> e com excelente capacidade de renovação celular.' },
    { cat:'epitelial', q:'Onde o tecido epitelial é encontrado?', a:'Na parte externa do corpo, na superfície interna e externa dos órgãos (estômago, pulmão, bexiga) e nas glândulas.' },
    { cat:'epitelial', q:'Quais são as funções do tecido epitelial?', a:'Revestir e proteger o corpo, <strong>secreção</strong> (estômago), <strong>absorção</strong> (intestino), <strong>impermeabilização</strong> (bexiga) e formação de glândulas.' },
    { cat:'epitelial', q:'Glândula exócrina vs. endócrina — diferença principal?', a:'<strong>Exócrina:</strong> tem ductos, secreção vai à superfície (ex: sudorípara, mamária). <strong>Endócrina:</strong> sem ductos, lança hormônios direto no sangue (ex: tireoide, hipófise).' },
    { cat:'epitelial', q:'Por que o pâncreas é glândula mista?', a:'Age como <strong>exócrina</strong> (enzimas digestivas por ductos) E <strong>endócrina</strong> (insulina e glucagon direto no sangue).' },
    { cat:'conjuntivo', q:'Quais são as divisões do tecido conjuntivo?', a:'A) Propriamente Dito | B) Adiposo | C) Sanguíneo | D) Cartilaginoso | E) Ósseo' },
    { cat:'conjuntivo', q:'Três componentes estruturais do tecido conjuntivo?', a:'<strong>1. Matriz extracelular</strong> | <strong>2. Fibras</strong> (colágenas, elásticas, reticulares) | <strong>3. Células</strong> (fibroblastos, macrófagos, mastócitos, plasmócitos).' },
    { cat:'conjuntivo', q:'Função do fibroblasto?', a:'Produz o <strong>colágeno</strong> e a substância intercelular do tecido conjuntivo.' },
    { cat:'conjuntivo', q:'Função do macrófago?', a:'Realiza <strong>fagocitose e pinocitose</strong>. Remove restos celulares e combate microorganismos. Tem inúmeros lisossomos.' },
    { cat:'conjuntivo', q:'Função do mastócito?', a:'Contém <strong>heparina</strong> (anticoagulante) e <strong>histamina</strong>. Libera histamina em reações alérgicas.' },
    { cat:'conjuntivo', q:'Função do plasmócito?', a:'Produz <strong>anticorpos</strong>. Abundante em locais sujeitos à entrada de bactérias (intestino, pele).' },
    { cat:'conjuntivo', q:'Por que surgem rugas?', a:'As <strong>fibras colágenas</strong> se unem com a idade, tornando o tecido conjuntivo mais rígido e menos elástico.' },
    { cat:'conjuntivo', q:'Funções do tecido adiposo?', a:'<strong>Reserva de energia</strong> | <strong>Isolante térmico</strong> | <strong>Amortecedor</strong> contra choques mecânicos.' },
    { cat:'conjuntivo', q:'O que é hematopoiese?', a:'Formação contínua de células sanguíneas na <strong>medula óssea vermelha</strong> a partir de células-tronco pluripotentes. Medula amarela = gordurosa (tutano).' },
    { cat:'conjuntivo', q:'Três grupos de células sanguíneas e funções?', a:'<strong>Eritrócitos:</strong> trocam O₂/CO₂ | <strong>Leucócitos:</strong> defesa imune (5 tipos) | <strong>Plaquetas:</strong> coagulação.' },
    { cat:'conjuntivo', q:'Funções do plasma sanguíneo?', a:'Transporta hemácias, leucócitos, plaquetas e: proteínas, nutrientes, excretas, hormônios, anticorpos, sais/íons e gases.' },
    { cat:'conjuntivo', q:'Células do tecido cartilaginoso?', a:'<strong>Condroblastos</strong> secretam a matriz → aprisionados = <strong>condrócitos</strong>. Lacuna que ocupam = <strong>condroplasto</strong>.' },
    { cat:'conjuntivo', q:'Características do tecido cartilaginoso?', a:'Consistência <strong>firme e flexível</strong>. <strong>Avascular</strong> — nutrição pelo pericôndrio. Abundante material extracelular.' },
    { cat:'conjuntivo', q:'Células do tecido ósseo e composição da matriz?', a:'Células: <strong>osteoblastos, osteócitos, osteoclastos</strong>. Matriz: 35% orgânica (colágeno) + 65% inorgânica (fosfato e cálcio).' },
    { cat:'conjuntivo', q:'Funções do tecido ósseo?', a:'Suporte | Protege medula e órgãos | <strong>Hematopoiese</strong> | Origem/inserção muscular | Depósito de cálcio e fosfato.' },
    { cat:'muscular', q:'Três tipos de tecido muscular?', a:'A) <strong>Estriado Esquelético</strong> (voluntário, multinucleado) | B) <strong>Estriado Cardíaco</strong> (involuntário, binucleado, discos intercalares) | C) <strong>Liso</strong> (involuntário, mononucleado).' },
    { cat:'muscular', q:'Onde é encontrado o músculo liso?', a:'Órgãos viscerais: <strong>esôfago, intestino, vasos sanguíneos e útero</strong>. Responsável pelo <strong>peristaltismo</strong>.' },
    { cat:'muscular', q:'O que são discos intercalares?', a:'Estruturas que <strong>unem as células cardíacas</strong>, permitindo contração <strong>rítmica e vigorosa</strong> para manter a circulação.' },
    { cat:'nervoso', q:'Características do tecido nervoso?', a:'Formado por <strong>neurônios</strong>. Recebem mensagens via <strong>dendritos</strong> e transmitem via <strong>axônio</strong> para neurônios, glândulas e músculos.' },
  ],

  diss: [
    { cat:'epitelial', q:'Explique as principais características e funções do tecido epitelial.', gabarito:'O tecido epitelial apresenta células justapostas (muito unidas), sem vascularização própria e com excelente capacidade de renovação celular. Suas funções incluem: revestir e proteger o corpo contra microorganismos, substâncias químicas e agressões físicas; secreção (estômago); secreção e absorção (intestino); impermeabilização (bexiga urinária); e formação de glândulas.' },
    { cat:'epitelial', q:'Qual a diferença entre glândula exócrina e endócrina? Dê dois exemplos de cada.', gabarito:'Glândulas exócrinas possuem ductos/canais e lançam sua secreção na superfície do corpo ou de órgãos. Exemplos: glândulas mamárias e sudoríparas. Glândulas endócrinas não possuem ductos e eliminam seus produtos (hormônios) diretamente na corrente sanguínea. Exemplos: tireoide e hipófise. O pâncreas é um caso especial, pois funciona como glândula mista (exócrina e endócrina).' },
    { cat:'conjuntivo', q:'Cite e explique as células do tecido conjuntivo propriamente dito e suas funções.', gabarito:'Fibroblasto: produz colágeno e substância intercelular. Macrófago: realiza fagocitose e pinocitose, remove restos celulares e combate microorganismos invasores. Mastócito: contém heparina (anticoagulante) e histamina; libera histamina em reações alérgicas. Plasmócito: produz anticorpos no combate a microorganismos; abundante em locais sujeitos à penetração de bactérias.' },
    { cat:'conjuntivo', q:'O que é hematopoiese? Onde ocorre e quais células são produzidas?', gabarito:'Hematopoiese é o processo de formação contínua das células sanguíneas. Ocorre na medula óssea vermelha a partir de células-tronco pluripotentes. São produzidas: eritrócitos (hemácias — responsáveis pela troca de oxigênio por dióxido de carbono), leucócitos (glóbulos brancos — cinco tipos, responsáveis pela defesa imunológica) e plaquetas (responsáveis pela coagulação sanguínea). A medula óssea amarela é constituída de tecido adiposo (tutano) e não realiza hematopoiese.' },
    { cat:'conjuntivo', q:'Quais são as funções do plasma sanguíneo?', gabarito:'O plasma é a parte líquida do sangue e transporta hemácias, leucócitos, plaquetas e diversas substâncias dissolvidas: proteínas, nutrientes, excretas (resíduos do metabolismo), hormônios, anticorpos, sais e íons (sódio, potássio) e gases. Dessa forma, permite que as células recebam nutrientes e excretem ou secretem substâncias geradas no metabolismo.' },
    { cat:'conjuntivo', q:'Compare o tecido cartilaginoso com o tecido ósseo em termos de células, vascularização e funções.', gabarito:'Tecido cartilaginoso: células são condroblastos (secretam a matriz) e condrócitos (aprisionados na matriz). É avascular — nutrição feita pelo pericôndrio. Funções: suporte estrutural, revestimento de superfícies articulares e molde para o desenvolvimento ósseo fetal. Tecido ósseo: células são osteoblastos (formam o osso), osteócitos (manutenção) e osteoclastos (reabsorção). É vascularizado, com sensibilidade, alto metabolismo e capacidade de regeneração. Funções: sustentação, proteção da medula e órgãos, hematopoiese, inserção muscular e depósito de cálcio e fosfato.' },
    { cat:'muscular', q:'Descreva os três tipos de tecido muscular, incluindo tipo de contração, número de núcleos e localização.', gabarito:'1) Estriado esquelético: contração voluntária, células multinucleadas com estrias longitudinais e transversais. Forma os músculos ligados à estrutura óssea, permitindo movimentação do corpo. 2) Estriado cardíaco: contração involuntária, células binucleadas do miocárdio unidas por discos intercalares. Esses discos aumentam a adesão celular para contração rítmica e vigorosa, mantendo a circulação. 3) Muscular liso: contração involuntária, células mononucleadas com estrias longitudinais. Encontrado em órgãos viscerais (esôfago, intestino, vasos, útero), responsável pelo peristaltismo.' },
    { cat:'nervoso', q:'Descreva as características do tecido nervoso e explique como o neurônio transmite mensagens.', gabarito:'O tecido nervoso é formado principalmente por neurônios, células especializadas na condução de impulsos nervosos. O neurônio recebe mensagens de outras células pelos dendritos (ramificações receptoras) e as conduz pelo corpo celular até o axônio, que transmite o impulso para outros neurônios, glândulas ou músculos. Os neurônios integram e coordenam as funções do sistema nervoso central (cérebro e medula espinhal) e periférico (nervos).' },
  ]
};

const CATS = ['epitelial','conjuntivo','muscular','nervoso'];
const CAT_LABELS = { epitelial:'Epitelial', conjuntivo:'Conjuntivo', muscular:'Muscular', nervoso:'Nervoso' };

let mode = 'quiz';
let quizFilter = 'all', flashFilter = 'all', dissFilter = 'all';
let quizItems = [], qIdx = 0, score = 0, answered = false;
let flashItems = [], fIdx = 0, flipped = false;
let dissItems = [], dIdx = 0, dissLoading = false;

// MODE
function setMode(m) {
  mode = m;
  document.getElementById('quiz-mode').style.display = m==='quiz'?'block':'none';
  document.getElementById('flash-mode').style.display = m==='flash'?'block':'none';
  document.getElementById('diss-mode').style.display = m==='diss'?'block':'none';
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&m==='quiz')||(i===1&&m==='flash')||(i===2&&m==='diss')));
  if(m==='flash') renderFlash();
  if(m==='diss') renderDiss();
}

function buildFilters(containerId, currentFilter, setter) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn'+(currentFilter==='all'?' active-f':'');
  allBtn.textContent = 'Todos';
  allBtn.onclick = ()=>setter('all');
  c.appendChild(allBtn);
  CATS.forEach(cat=>{
    const b = document.createElement('button');
    b.className = 'filter-btn'+(currentFilter===cat?' active-f':'');
    b.textContent = CAT_LABELS[cat];
    b.onclick = ()=>setter(cat);
    c.appendChild(b);
  });
}

// ===== QUIZ =====
function setQuizFilter(f) { quizFilter=f; restartQuiz(); }
function restartQuiz() {
  const pool = quizFilter==='all'?ALL_DATA.quiz:ALL_DATA.quiz.filter(q=>q.cat===quizFilter);
  quizItems = shuffle([...pool]); qIdx=0; score=0; answered=false;
  buildFilters('quiz-filters',quizFilter,setQuizFilter);
  document.getElementById('score-board').classList.remove('show');
  renderQuestion();
}
function renderQuestion() {
  const area = document.getElementById('quiz-area');
  if(qIdx>=quizItems.length){showScore();return;}
  const item = quizItems[qIdx];
  updateQuizProgress(); answered=false;
  area.innerHTML=`<div class="quiz-card"><span class="category-tag cat-${item.cat}">${CAT_LABELS[item.cat]}</span><div class="question-text">${item.q}</div><div class="options" id="opts">${item.opts.map((o,i)=>`<button class="option" onclick="selectOpt(${i})">${o}</button>`).join('')}</div><div class="feedback" id="feedback"></div></div><div class="nav-row" style="margin-top:0"><button class="btn btn-primary" onclick="nextQ()" id="next-btn" style="display:none">Próxima →</button></div>`;
}
function selectOpt(i) {
  if(answered)return; answered=true;
  const item=quizItems[qIdx];
  const opts=document.querySelectorAll('.option');
  opts.forEach((o,idx)=>{o.disabled=true;if(idx===item.correct)o.classList.add('correct');});
  const fb=document.getElementById('feedback');
  if(i===item.correct){score++;opts[i].classList.add('correct');fb.className='feedback show correct-fb';fb.textContent='✓ Correto! '+item.exp;}
  else{opts[i].classList.add('wrong');fb.className='feedback show wrong-fb';fb.textContent='✗ '+item.exp;}
  document.getElementById('next-btn').style.display='block';
}
function nextQ(){qIdx++;renderQuestion();}
function updateQuizProgress(){
  const pct=(qIdx/quizItems.length)*100;
  document.getElementById('quiz-progress').style.width=pct+'%';
  document.getElementById('quiz-progress-text').textContent=`Questão ${qIdx+1} de ${quizItems.length}`;
}
function showScore(){
  document.getElementById('quiz-area').innerHTML='';
  const sb=document.getElementById('score-board'); sb.classList.add('show');
  const pct=Math.round((score/quizItems.length)*100);
  document.getElementById('score-num').textContent=`${score}/${quizItems.length}`;
  document.getElementById('score-sub').textContent=`${pct}% de acertos`;
  document.getElementById('score-emoji').textContent=pct>=80?'🎉':pct>=60?'💪':'📖';
}

// ===== FLASH =====
function setFlashFilter(f){
  flashFilter=f;
  const pool=f==='all'?ALL_DATA.flash:ALL_DATA.flash.filter(fc=>fc.cat===f);
  flashItems=shuffle([...pool]); fIdx=0;
  buildFilters('flash-filters',f,setFlashFilter); renderFlash();
}
function renderFlash(){
  if(!flashItems.length){flashItems=shuffle([...ALL_DATA.flash]);buildFilters('flash-filters',flashFilter,setFlashFilter);}
  const item=flashItems[fIdx];
  document.getElementById('fc-question').textContent=item.q;
  document.getElementById('fc-answer').innerHTML=item.a;
  document.getElementById('flashcard').classList.remove('flipped'); flipped=false;
  const pct=((fIdx+1)/flashItems.length)*100;
  document.getElementById('flash-progress').style.width=pct+'%';
  document.getElementById('flash-progress-text').textContent=`Card ${fIdx+1} de ${flashItems.length} · ${CAT_LABELS[item.cat]}`;
}
function flipCard(){flipped=!flipped;document.getElementById('flashcard').classList.toggle('flipped',flipped);}
function fcNav(dir){fIdx=(fIdx+dir+flashItems.length)%flashItems.length;renderFlash();}
function shuffleFlash(){
  const pool=flashFilter==='all'?ALL_DATA.flash:ALL_DATA.flash.filter(fc=>fc.cat===flashFilter);
  flashItems=shuffle([...pool]); fIdx=0; renderFlash();
}

// ===== DISSERTATIVO =====
function setDissFilter(f){
  dissFilter=f;
  const pool=f==='all'?ALL_DATA.diss:ALL_DATA.diss.filter(d=>d.cat===f);
  dissItems=shuffle([...pool]); dIdx=0;
  buildFilters('diss-filters',f,setDissFilter); renderDiss();
}
function renderDiss(){
  if(!dissItems.length){dissItems=shuffle([...ALL_DATA.diss]);buildFilters('diss-filters',dissFilter,setDissFilter);}
  const item=dissItems[dIdx];
  const pct=((dIdx+1)/dissItems.length)*100;
  document.getElementById('diss-progress').style.width=pct+'%';
  document.getElementById('diss-progress-text').textContent=`Questão ${dIdx+1} de ${dissItems.length} · ${CAT_LABELS[item.cat]}`;
  document.getElementById('diss-area').innerHTML=`
    <div class="diss-card">
      <span class="category-tag cat-${item.cat}">${CAT_LABELS[item.cat]}</span>
      <div class="question-text">${item.q}</div>
      <textarea class="diss-textarea" id="diss-input" placeholder="Digite sua resposta aqui..."></textarea>
      <div class="diss-result" id="diss-result"></div>
    </div>
    <div class="nav-row">
      <button class="btn btn-icon" onclick="dissNav(-1)" ${dIdx===0?'style="opacity:0.3;cursor:default"':''}>←</button>
      <button class="btn btn-primary" id="check-btn" onclick="checkDiss()">Verificar Resposta</button>
      <button class="btn btn-icon" onclick="dissNav(1)" ${dIdx===dissItems.length-1?'style="opacity:0.3;cursor:default"':''}>→</button>
    </div>`;
}
function dissNav(dir){
  const newIdx=dIdx+dir;
  if(newIdx<0||newIdx>=dissItems.length)return;
  dIdx=newIdx; renderDiss();
}

async function checkDiss(){
  if(dissLoading)return;
  const userAnswer=document.getElementById('diss-input').value.trim();
  if(!userAnswer){
    const ta=document.getElementById('diss-input');
    ta.style.borderColor='var(--wrong)';
    setTimeout(()=>ta.style.borderColor='',1200);
    return;
  }
  const item=dissItems[dIdx];
  dissLoading=true;
  const btn=document.getElementById('check-btn');
  btn.disabled=true; btn.textContent='Analisando...';
  const result=document.getElementById('diss-result');
  result.className='diss-result show loading';
  result.innerHTML='<span class="spin">⟳</span> A IA está comparando sua resposta com o gabarito...';

  try {
    const prompt=`Você é professor de Histologia Humana. Compare a resposta do aluno com o gabarito e avalie.

PERGUNTA: ${item.q}

GABARITO: ${item.gabarito}

RESPOSTA DO ALUNO: ${userAnswer}

Responda APENAS em JSON válido, sem markdown, sem texto fora do JSON:
{"nota": <número de 0 a 10>, "nivel": "<ótimo|bom|incompleto|incorreto>", "avaliacao": "<2-3 frases avaliando o que acertou e o que faltou>", "dica": "<1 frase com o ponto mais importante que faltou, ou vazio se acertou tudo>"}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await response.json();
    const raw = data.content[0].text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(raw);

    const nivelMap = { ótimo:'great', bom:'ok', incompleto:'ok', incorreto:'low' };
    const cls = nivelMap[parsed.nivel] || 'ok';
    const emoji = parsed.nivel==='ótimo'?'🎉':parsed.nivel==='bom'?'✅':parsed.nivel==='incompleto'?'📝':'❌';

    result.className='diss-result show done';
    result.innerHTML=`
      <div class="result-score-row">
        <div class="result-badge ${cls}">${parsed.nota}/10</div>
        <div>
          <div class="result-label ${cls}">${emoji} ${parsed.nivel.charAt(0).toUpperCase()+parsed.nivel.slice(1)}</div>
        </div>
      </div>
      <div class="result-text">${parsed.avaliacao}${parsed.dica?`<br><br><strong>💡 Dica:</strong> ${parsed.dica}`:''}</div>
      <div class="gabarito-box">
        <div class="gabarito-label">Gabarito</div>
        <div class="gabarito-text">${item.gabarito.replace(/\b(hematopoiese|colágeno|fibroblasto|macrófago|mastócito|plasmócito|condrócito|osteoblasto|osteócito|osteoclasto|eritrócito|leucócito|plaqueta|plasma|pericôndrio|miócito|neurônio|dendrito|axônio)\b/gi, '<strong>$1</strong>')}</div>
      </div>`;
  } catch(e) {
    result.className='diss-result show loading';
    result.innerHTML='⚠️ Erro ao conectar com a IA. Verifique sua conexão e tente novamente.';
  }
  dissLoading=false; btn.disabled=false; btn.textContent='Verificar Resposta';
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

// INIT
restartQuiz();
flashItems=shuffle([...ALL_DATA.flash]); renderFlash();
dissItems=shuffle([...ALL_DATA.diss]);
buildFilters('diss-filters',dissFilter,setDissFilter);
renderDiss();
</script>
</body>
</html>
